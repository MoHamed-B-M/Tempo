name: Build Release APK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        shell: bash
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --no-daemon
          cd ..
          APK=$(find android/app/build/outputs -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK produced"
            find android/app/build/outputs -type f 2>/dev/null || echo "outputs dir empty"
            exit 1
          fi
          mkdir -p build/app/outputs/flutter-apk
          cp "$APK" build/app/outputs/flutter-apk/app-release.apk
          echo "APK: $APK"

      - name: Upload APK to artifact
        uses: actions/upload-artifact@v4
        with:
          name: tempo-release-artifacts
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Extract changelog for current version
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ESCAPED_VERSION=$(printf '%s\n' "$VERSION" | sed 's/[.[\*^$()+?|\\]/\\&/g')
          awk -v ver="$ESCAPED_VERSION" '
            BEGIN { found = 0 }
            /^## / {
              if (found) exit
              if ($0 ~ "^## \\[" ver "\\]" || $0 ~ "^## " ver "$") found = 1
              next
            }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release version $VERSION" > RELEASE_NOTES.md
          fi

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
            echo "Keystore decoded successfully"
          else
            echo "WARNING: KEYSTORE_BASE64 secret not set, using auto-generated keystore"
          fi

      - name: Build signed release APK
        shell: bash
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --no-daemon
          cd ..
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'android' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'upload' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android' }}

      - name: Build signed release AAB
        shell: bash
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon
          cd ..
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'android' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'upload' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android' }}

      - name: Prepare release artifacts
        id: find-apk
        shell: bash
        run: |
          mkdir -p release-artifacts
          APK=$(find android/app/build/outputs -name "*release*.apk" 2>/dev/null | head -1)
          AAB=$(find android/app/build/outputs -name "*release*.aab" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" release-artifacts/tempo-release.apk
            echo "apk=release-artifacts/tempo-release.apk" >> $GITHUB_OUTPUT
            echo "Found APK: $APK"
          else
            echo "WARNING: No APK found"
            echo "apk=" >> $GITHUB_OUTPUT
          fi
          if [ -n "$AAB" ]; then
            cp "$AAB" release-artifacts/tempo-release.aab
            echo "aab=release-artifacts/tempo-release.aab" >> $GITHUB_OUTPUT
            echo "Found AAB: $AAB"
          else
            echo "WARNING: No AAB found"
            echo "aab=" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            ${{ steps.find-apk.outputs.apk }}
            ${{ steps.find-apk.outputs.aab }}
          generate_release_notes: false
