name: Build Release APK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build release APK & App Bundle
        run: |
          flutter build apk --release --split-debug-info=build/debug-info --obfuscate
          flutter build appbundle --release --split-debug-info=build/debug-info --obfuscate

      - name: Upload APK & AAB to artifact
        uses: actions/upload-artifact@v4
        with:
          name: tempo-release-artifacts
          path: |
            build/app/outputs/flutter-apk/app-universal-release.apk
            build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Extract changelog for current version
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ESCAPED_VERSION=$(printf '%s\n' "$VERSION" | sed 's/[.[\*^$()+?|\\]/\\&/g')
          awk -v ver="$ESCAPED_VERSION" '
            BEGIN { found = 0 }
            /^## / {
              if (found) exit
              if ($0 ~ "^## \\[" ver "\\]" || $0 ~ "^## " ver "$") found = 1
              next
            }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release version $VERSION" > RELEASE_NOTES.md
          fi

      - name: Decode Keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Build signed release APK & App Bundle
        run: |
          flutter build apk --release --split-debug-info=build/debug-info --obfuscate
          flutter build appbundle --release --split-debug-info=build/debug-info --obfuscate
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            build/app/outputs/flutter-apk/app-universal-release.apk
            build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: false
