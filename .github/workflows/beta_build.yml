name: Beta Build

on:
  push:
    branches:
      - beta

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Build release APK
        run: flutter build apk --release --split-debug-info=build/debug-info --obfuscate
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK to artifact
        uses: actions/upload-artifact@v4
        with:
          name: tempo-beta-apk
          path: build/app/outputs/flutter-apk/
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: tempo-beta-apk
          path: apk

      - name: Find APK file
        id: find-apk
        shell: bash
        run: |
          APK=$(ls apk/app-*-release.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(ls apk/*.apk 2>/dev/null | head -1)
          fi
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: Generate version tag from pubspec
        id: version
        run: |
          FULL_VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          VERSION=$(echo "$FULL_VERSION" | sed 's/+.*//')
          TAG="v${VERSION}-beta.${GITHUB_RUN_NUMBER}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk -v ver="$VERSION" '
            BEGIN { found = 0 }
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]") > 0 || index($0, ver) > 0) found = 1
              next
            }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md 2>/dev/null || true
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No changelog section found for v$VERSION. Generating from commits." > RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            git log --oneline --no-decorate -20 2>/dev/null >> RELEASE_NOTES.md || true
          fi

      - name: Create Prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Beta ${{ steps.version.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: ${{ steps.find-apk.outputs.path }}
          prerelease: true
          generate_release_notes: true
