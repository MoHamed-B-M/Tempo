name: Beta Build

on:
  push:
    branches:
      - beta

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 1. Decode the Keystore from GitHub Secrets
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      # 2. Build the signed Release APK
      - name: Build release APK
        run: flutter build apk --release --split-debug-info=build/debug-info --obfuscate
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK to artifact
        uses: actions/upload-artifact@v4
        with:
          name: tempo-beta-apk
          path: build/app/outputs/flutter-apk/
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: tempo-beta-apk
          path: apk

      - name: Find APK file
        id: find-apk
        shell: bash
        run: |
          APK=$(ls apk/app-*-release.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(ls apk/*.apk 2>/dev/null | head -1)
          fi
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: Generate version tag
        id: version
        run: |
          CURRENT_VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)
          BETA_PATCH=$((PATCH + 1))
          TAG="v$MAJOR.$MINOR.$BETA_PATCH-beta.${GITHUB_RUN_NUMBER}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$MAJOR.$MINOR.$BETA_PATCH-beta.${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT

      - name: Create Prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Beta ${{ steps.version.outputs.version }}
          body: "Automated Beta build from commit ${{ github.sha }}"
          files: ${{ steps.find-apk.outputs.path }}
          prerelease: true
          generate_release_notes: true
