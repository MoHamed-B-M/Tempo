name: Beta Preview Build

on:
  push:
    branches:
      - beta

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      # Restore Flutter SDK + Pub cache + Gradle cache on cache hit,
      # otherwise they'll be populated after the build for next run.
      # Key includes runner OS, Flutter channel, and pubspec.lock hash
      # so that any dependency change invalidates the cache.
      - name: Cache Flutter SDK, Pub deps, and Gradle
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-flutter-stable-${{ hashFiles('**/pubspec.lock') }}
          path: |
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Build release APK
        run: flutter build apk --release --split-debug-info=build/debug-info --obfuscate --strip --target-platform android-arm64
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Prepare APK artifact
        run: |
          mkdir -p outputs
          cp build/app/outputs/flutter-apk/app-release.apk outputs/tempo-preview.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tempo-preview-apk
          path: outputs/tempo-preview.apk
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: tempo-preview-apk
          path: outputs

      # Delete the old rolling "preview" tag and release so the new
      # one replaces it cleanly.  The || true ignores errors that
      # occur on the very first run when no preview release exists yet.
      - name: Delete old preview release
        run: gh release delete preview --cleanup-tag -y || true
        env:
          GH_TOKEN: ${{ github.token }}

      # Extract only the top-most changelog entry (everything between
      # the first ## Version header and the second one, or EOF).
      #   - Matches lines starting with "## "
      #   - On first match sets found=1 and skips the header line
      #   - On second match exits immediately (stops reading)
      #   - Prints all lines while found==1
      # This gives us just the release notes for the current version.
      - name: Extract latest changelog entry
        id: changelog
        run: |
          awk '/^## /{if(found) exit; found=1; next} found' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No changelog entries found." > RELEASE_NOTES.md
          fi
          echo "Extracted changelog:"
          head -5 RELEASE_NOTES.md

      - name: Publish preview release
        uses: ncipollo/release-action@v1
        with:
          tag: preview
          name: "Preview Build"
          bodyFile: RELEASE_NOTES.md
          artifacts: outputs/tempo-preview.apk
          prerelease: true
          replacesArtifacts: true
          token: ${{ github.token }}
