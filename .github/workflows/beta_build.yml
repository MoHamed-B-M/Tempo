name: Beta Build

on:
  push:
    branches:
      - beta

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build release APK
        run: flutter build apk --release --split-debug-info=build/debug-info --obfuscate

      - name: Upload APK to artifact
        uses: actions/upload-artifact@v4
        with:
          name: tempo-beta-apk
          path: build/app/outputs/flutter-apk/
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: tempo-beta-apk
          path: apk

      - name: Find APK file
        id: find-apk
        shell: bash
        run: |
          APK=$(ls apk/app-*-release.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(ls apk/*.apk 2>/dev/null | head -1)
          fi
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: Generate version tag
        id: version
        run: |
          CURRENT_VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)
          BETA_PATCH=$((PATCH + 1))
          TAG="v$MAJOR.$MINOR.$BETA_PATCH-beta.${GITHUB_RUN_NUMBER}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$MAJOR.$MINOR.$BETA_PATCH-beta.${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT

      - name: Extract changelog
        shell: bash
        run: |
          awk '
            BEGIN { found = 0 }
            /^## / {
              if (found) exit
              if ($0 ~ "^## \\[Unreleased\\]" || $0 ~ "^## Unreleased") found = 1
              next
            }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md 2>/dev/null || true
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Beta build from commit $(git log -1 --format='%h')" > RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            echo "Changes:" >> RELEASE_NOTES.md
            git log --oneline --no-decorate HEAD~5..HEAD 2>/dev/null >> RELEASE_NOTES.md || true
          fi

      - name: Create Prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Beta ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: ${{ steps.find-apk.outputs.path }}
          prerelease: true
          generate_release_notes: false
