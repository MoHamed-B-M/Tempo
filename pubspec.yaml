name: tempo
description: A minimalist, high-fidelity alarm clock app.
publish_to: "none"
version: 1.5.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^6.1.0
  intl: ^0.19.0
  uuid: ^4.5.1
  http: ^1.2.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  audioplayers: ^6.1.0
  timezone: ^0.9.4
  flutter_timezone: ^5.1.0
  m3e_core: ^0.1.0
  motor: ^1.1.0
  animations: ^2.0.0
  dynamic_color: ^1.8.0
  connectivity_plus: ^6.1.0
  flutter_local_notifications: ^17.2.0
  shared_preferences: ^2.2.0
  flutter_animate: ^4.5.0
  material_color_utilities: ^0.13.0
  pub_semver: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
